<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    overflow:hidden;
    font-family:'Poppins',sans-serif;
}

.container{
    text-align:center;
}

h1{
    font-family:'Dancing Script',cursive;
    font-size:4rem;
    color:white;
    margin-bottom:25px;
    text-shadow:2px 2px 10px rgba(0,0,0,0.2);
    animation:heartbeat 1.5s infinite;
}

.buttons{
    position:relative;
    width:400px;
    height:200px;
    margin:auto;
}

button{
    padding:15px 40px;
    border:none;
    border-radius:50px;
    font-size:1.2rem;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
}

#yesBtn{
    background:#ff3366;
    color:white;
    box-shadow:0 5px 15px rgba(255,51,102,.4);
}

#yesBtn:hover{
    transform:scale(1.1);
}

#noBtn{
    position:absolute;
    background:white;
    color:#ff3366;
    left:230px;
    top:0;
}

.result{
    display:none;
    text-align:center;
    color:white;
}

.result h2{
    font-family:'Dancing Script',cursive;
    font-size:4rem;
    margin-bottom:20px;
}

.result p{
    font-size:1.4rem;
}

.hearts{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    pointer-events:none;
}

.heart{
    position:absolute;
    color:white;
    font-size:25px;
    animation:float 6s linear infinite;
}

@keyframes heartbeat{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.08);}
}

@keyframes float{
    0%{
        transform:translateY(100vh);
        opacity:1;
    }
    100%{
        transform:translateY(-100px);
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="hearts" id="hearts"></div>

<div class="container" id="questionPage">
    <h1>I Love You ❤️</h1>

    <div class="buttons">
        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 😅</button>
    </div>
</div>

<div class="result" id="resultPage">
    <h2>🎉 Congratulations! 🎉</h2>
    <p>Now you are my girlfriend ❤️🥰</p>
    <br>
    <p>Forever & Always 💖</p>
</div>

<script>

// YES BUTTON
document.getElementById("yesBtn").addEventListener("click", function() {
    document.getElementById("questionPage").style.display = "none";
    document.getElementById("resultPage").style.display = "block";
});

// MOVING NO BUTTON
const noBtn = document.getElementById("noBtn");

function moveButton() {
    const maxX = window.innerWidth - 150;
    const maxY = window.innerHeight - 80;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    noBtn.style.position = "fixed";
    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);
noBtn.addEventListener("touchstart", moveButton);

// Floating Hearts
const heartsContainer = document.getElementById("hearts");

setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (20 + Math.random() * 30) + "px";

    heartsContainer.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}, 300);

</script>

</body>
</html>
